<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sr. Barbara's Class</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        /* -------------------------------------------------------------------------
           CSS variables — matches site palette
        ------------------------------------------------------------------------- */
        :root {
            --cream:      #f5f0e8;
            --brown-dark: #4a3728;
            --brown-mid:  #6b5744;
            --brown-light:#8b7355;
            --chalk:      #2a4a3a;
            --chalk-line: rgba(255,255,255,0.03);
            --border:     #5c4033;
            --text-chalk: #f5f5f5;
            --text-dim:   #e8e8e8;
            --parchment:  #faf6ee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lora', Georgia, serif;
            background-color: var(--cream);
            color: var(--brown-dark);
            min-height: 100vh;
        }

        /* -------------------------------------------------------------------------
           Nav
        ------------------------------------------------------------------------- */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            border-bottom: 2px solid var(--brown-light);
            background: var(--cream);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-logo {
            font-family: 'Lora', Georgia, serif;
            font-size: 1.1em;
            font-weight: 600;
            color: var(--brown-dark);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            color: var(--brown-mid);
            text-decoration: none;
            font-size: 0.95em;
            font-style: italic;
            transition: color 0.15s;
        }

        .nav-links a:hover {
            color: var(--brown-dark);
        }

        /* -------------------------------------------------------------------------
           Letter
        ------------------------------------------------------------------------- */
        .letter-wrapper {
            max-width: 720px;
            margin: 48px auto 60px;
            padding: 0 20px;
        }

        .letter {
            background: var(--parchment);
            border: 1px solid #d9cfc0;
            border-radius: 2px;
            box-shadow:
                0 2px 8px rgba(0,0,0,0.08),
                0 8px 24px rgba(0,0,0,0.06);
            padding: 56px 64px 48px;
        }

        .letter-loading {
            text-align: center;
            color: var(--brown-light);
            font-style: italic;
            padding: 48px 0;
        }

        .letter-error {
            text-align: center;
            color: var(--brown-mid);
            font-style: italic;
            padding: 48px 0;
        }

        /* Rendered markdown content */
        .letter-body h1 {
            font-family: 'Patrick Hand', Georgia, serif;
            font-size: 1.6em;
            color: var(--brown-dark);
            margin-bottom: 28px;
            letter-spacing: 0.02em;
        }

        .letter-body h2 {
            font-family: 'Lora', Georgia, serif;
            font-size: 1.1em;
            font-weight: 600;
            color: var(--brown-dark);
            margin: 28px 0 12px;
        }

        .letter-body p {
            font-size: 1em;
            line-height: 1.85;
            color: var(--brown-dark);
            margin-bottom: 18px;
        }

        .letter-body a {
            color: var(--brown-mid);
            text-decoration: underline;
        }

        .letter-body a:hover {
            color: var(--brown-dark);
        }

        .letter-body ul,
        .letter-body ol {
            margin: 0 0 18px 24px;
            line-height: 1.85;
        }

        .letter-body li {
            margin-bottom: 6px;
        }

        .letter-body blockquote {
            border-left: 3px solid var(--brown-light);
            margin: 0 0 18px;
            padding: 4px 20px;
            color: var(--brown-mid);
            font-style: italic;
        }

        .letter-body hr {
            border: none;
            border-top: 1px solid #d9cfc0;
            margin: 32px 0;
        }

        /* -------------------------------------------------------------------------
           Signature block
        ------------------------------------------------------------------------- */
        .signature-block {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid #d9cfc0;
        }

        .signature-img {
            display: block;
            max-width: 220px;
            max-height: 80px;
            mix-blend-mode: multiply;
            opacity: 0.85;
            margin-bottom: 6px;
        }

        .signature-name {
            font-family: 'Lora', Georgia, serif;
            font-size: 1em;
            color: var(--brown-dark);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .signature-title {
            font-size: 0.85em;
            color: var(--brown-mid);
            font-style: italic;
        }

        /* -------------------------------------------------------------------------
           Footer
        ------------------------------------------------------------------------- */
        footer {
            border-top: 2px solid var(--brown-light);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85em;
            color: var(--brown-mid);
            font-style: italic;
        }

        footer a {
            color: var(--brown-dark);
            text-decoration: underline;
        }

        footer a:hover {
            color: var(--brown-mid);
        }

        /* -------------------------------------------------------------------------
           Responsive
        ------------------------------------------------------------------------- */
        @media (max-width: 600px) {
            .letter {
                padding: 36px 28px 36px;
            }

            nav {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav>
        <a class="nav-logo" href="index.html">Sr. Barbara's Class</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="signup.html">Sign Up</a></li>
            <li><a href="https://github.com/carolynboyle/sr-barbara" target="_blank" rel="noopener">GitHub</a></li>
        </ul>
    </nav>

    <!-- Letter -->
    <div class="letter-wrapper">
        <div class="letter">
            <div id="letter-content" class="letter-body">
                <p class="letter-loading">Loading…</p>
            </div>

            <div class="signature-block">
                <img class="signature-img"
                     src="https://raw.githubusercontent.com/carolynboyle/sr-barbara/gh-pages/cfb-sign.png"
                     alt="Carolyn F. Boyle signature">
                <div class="signature-name">Carolyn Boyle</div>
                <div class="signature-title">Sr. Barbara's Class</div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <span>Sr. Barbara's Class</span>
        <span><a href="signup.html">Join the community →</a></span>
    </footer>

    <script>
        // -------------------------------------------------------------------------
        // Minimal markdown renderer — covers headings, bold, italic, links,
        // blockquotes, hr, ul/ol, paragraphs. No external dependency.
        // -------------------------------------------------------------------------
        function renderMarkdown(md) {
            const lines = md.split('\n');
            const html  = [];
            let inList  = null;  // 'ul' | 'ol' | null

            function closeList() {
                if (inList) {
                    html.push(`</${inList}>`);
                    inList = null;
                }
            }

            function inlineFormat(text) {
                return text
                    .replace(/\*\*(.+?)\*\*/g,  '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g,       '<em>$1</em>')
                    .replace(/_(.+?)_/g,          '<em>$1</em>')
                    .replace(/`(.+?)`/g,          '<code>$1</code>')
                    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
            }

            for (const raw of lines) {
                const line = raw.trimEnd();

                // Headings
                const h = line.match(/^(#{1,3})\s+(.*)/);
                if (h) {
                    closeList();
                    const level = h[1].length;
                    html.push(`<h${level}>${inlineFormat(h[2])}</h${level}>`);
                    continue;
                }

                // HR
                if (/^---+$/.test(line)) {
                    closeList();
                    html.push('<hr>');
                    continue;
                }

                // Blockquote
                const bq = line.match(/^>\s*(.*)/);
                if (bq) {
                    closeList();
                    html.push(`<blockquote><p>${inlineFormat(bq[1])}</p></blockquote>`);
                    continue;
                }

                // Unordered list
                const ul = line.match(/^[-*]\s+(.*)/);
                if (ul) {
                    if (inList !== 'ul') { closeList(); html.push('<ul>'); inList = 'ul'; }
                    html.push(`<li>${inlineFormat(ul[1])}</li>`);
                    continue;
                }

                // Ordered list
                const ol = line.match(/^\d+\.\s+(.*)/);
                if (ol) {
                    if (inList !== 'ol') { closeList(); html.push('<ol>'); inList = 'ol'; }
                    html.push(`<li>${inlineFormat(ol[1])}</li>`);
                    continue;
                }

                // Blank line
                if (line.trim() === '') {
                    closeList();
                    continue;
                }

                // Paragraph
                closeList();
                html.push(`<p>${inlineFormat(line)}</p>`);
            }

            closeList();
            return html.join('\n');
        }

        // -------------------------------------------------------------------------
        // Load content from ?content=filename.md
        // Falls back to about.md if no param supplied
        // -------------------------------------------------------------------------
        async function loadContent() {
            const params   = new URLSearchParams(window.location.search);
            const filename = params.get('content') || 'about.md';
            const base     = 'https://raw.githubusercontent.com/carolynboyle/sr-barbara/gh-pages/';
            const url      = base + filename;
            const el       = document.getElementById('letter-content');

            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const md = await resp.text();
                el.innerHTML = renderMarkdown(md);

                // Use first h1 as page title if present
                const h1 = el.querySelector('h1');
                if (h1) document.title = `${h1.textContent} — Sr. Barbara's Class`;

            } catch (e) {
                el.innerHTML = `<p class="letter-error">Sorry, this letter couldn't be loaded.</p>`;
            }
        }

        loadContent();
    </script>

</body>
</html>
