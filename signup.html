<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay in Touch — Sr. Barbara's Class</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* -------------------------------------------------------------------------
           CSS variables — matches site palette
        ------------------------------------------------------------------------- */
        :root {
            --cream:      #f5f0e8;
            --brown-dark: #4a3728;
            --brown-mid:  #6b5744;
            --brown-light:#8b7355;
            --chalk:      #2a4a3a;
            --chalk-line: rgba(255,255,255,0.03);
            --border:     #5c4033;
            --text-chalk: #f5f5f5;
            --text-dim:   #e8e8e8;
            --parchment:  #faf6ee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lora', Georgia, serif;
            background-color: var(--cream);
            color: var(--brown-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* -------------------------------------------------------------------------
           Nav
        ------------------------------------------------------------------------- */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            border-bottom: 2px solid var(--brown-light);
            background: var(--cream);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-logo {
            font-family: 'Lora', Georgia, serif;
            font-size: 1.1em;
            font-weight: 600;
            color: var(--brown-dark);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            color: var(--brown-mid);
            text-decoration: none;
            font-size: 0.95em;
            font-style: italic;
            transition: color 0.15s;
        }

        .nav-links a:hover {
            color: var(--brown-dark);
        }

        /* -------------------------------------------------------------------------
           Page header
        ------------------------------------------------------------------------- */
        .page-header {
            max-width: 720px;
            margin: 48px auto 0;
            padding: 0 20px;
            text-align: center;
        }

        .chalkboard-title {
            font-family: 'Patrick Hand', Georgia, serif;
            font-size: 2em;
            color: var(--brown-dark);
            letter-spacing: 0.03em;
            margin-bottom: 12px;
        }

        .page-intro {
            font-size: 1em;
            line-height: 1.75;
            color: var(--brown-mid);
            font-style: italic;
            max-width: 560px;
            margin: 0 auto 36px;
        }

        /* -------------------------------------------------------------------------
           Form wrapper
        ------------------------------------------------------------------------- */
        .form-wrapper {
            max-width: 720px;
            margin: 0 auto 60px;
            padding: 0 20px;
            width: 100%;
        }

        .form-card {
            background: var(--parchment);
            border: 1px solid #d9cfc0;
            border-radius: 2px;
            box-shadow:
                0 2px 8px rgba(0,0,0,0.08),
                0 8px 24px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .airtable-embed {
            display: block;
            width: 100%;
            border: none;
            background: transparent;
        }

        /* -------------------------------------------------------------------------
           Footer
        ------------------------------------------------------------------------- */
        footer {
            margin-top: auto;
            border-top: 2px solid var(--brown-light);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85em;
            color: var(--brown-mid);
            font-style: italic;
        }

        footer a {
            color: var(--brown-dark);
            text-decoration: underline;
        }

        footer a:hover {
            color: var(--brown-mid);
        }

        /* -------------------------------------------------------------------------
           Responsive
        ------------------------------------------------------------------------- */
        @media (max-width: 600px) {
            nav {
                padding: 12px 16px;
            }

            .page-header {
                margin-top: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav>
        <a class="nav-logo" href="index.html">Sr. Barbara's Class</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="signed-page.html?content=about.md">About</a></li>
            <li><a href="https://github.com/carolynboyle/sr-barbara" target="_blank" rel="noopener">GitHub</a></li>
        </ul>
    </nav>

    <!-- Header -->
    <div class="page-header">
        <div class="chalkboard-title">Stay in Touch</div>
        <p class="page-intro">
            Leave your name and email and I'll let you know when new features
            land or the community space opens up. Notes welcome — Sr. Barbara
            reads everything.
        </p>
    </div>

    <!-- Form -->
    <div class="form-wrapper">
        <div class="form-card">
            <div id="form-loading" style="text-align:center; padding: 48px; font-family: 'Lora', Georgia, serif; font-style: italic; color: #8b7355;">
                Loading form…
            </div>
            <iframe
                class="airtable-embed"
                src="https://airtable.com/embed/applzS3a7LWOYPQJW/pagXVtv4GfinIGuHD/form"
                height="500"
                title="Stay in Touch — Sr. Barbara's Class"
                style="display:none;"
                onload="document.getElementById('form-loading').style.display='none'; this.style.display='block';">
            </iframe>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <span>Sr. Barbara's Class</span>
        <span><a href="signed-page.html?content=invite.md">Read the invitation →</a></span>
    </footer>

</body>
</html>
